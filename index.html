<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maps API — mapa vivo</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
  #bar { padding: 8px; background: #1a1a2e; color: #fff; display: flex;
         flex-wrap: wrap; gap: 6px; align-items: center; }
  #bar input[type=text] { flex: 1; min-width: 130px; padding: 7px 10px;
         border-radius: 8px; border: none; font-size: 14px; }
  #bar select, #bar button { padding: 7px 8px; border-radius: 8px;
         border: none; font-size: 13px; }
  #bar label { font-size: 12px; display: flex; align-items: center; gap: 3px;
         white-space: nowrap; }
  #bar button { background: #e94560; color: #fff; font-weight: 600;
         cursor: pointer; }
  #map { height: calc(100vh - 96px); }
  #status { padding: 4px 10px; font-size: 12px; background: #16213e;
         color: #9fb3c8; }
  .popup h3 { margin: 0 0 4px; font-size: 15px; }
  .popup .meta { color: #555; font-size: 12px; margin-bottom: 6px; }
  .popup .tag { display: inline-block; background: #eef; color: #336;
         border-radius: 10px; padding: 1px 8px; font-size: 11px;
         margin: 0 3px 3px 0; }
  .popup .event { background: #fff7e6; border-radius: 8px; padding: 6px 8px;
         font-size: 12px; margin: 6px 0; }
  .popup a { color: #e94560; font-weight: 600; font-size: 13px; }
  .aberto { color: #0a7d33; font-weight: 700; }
  .fechado { color: #a33; font-weight: 700; }
</style>
</head>
<body>
<div id="bar">
  <input id="q" type="text" placeholder="samba, espetinho, rock...">
  <select id="when">
    <option value="">qualquer dia</option>
    <option value="today">hoje</option>
    <option value="weekend">fim de semana</option>
  </select>
  <select id="radius">
    <option value="1000">1 km</option>
    <option value="2000" selected>2 km</option>
    <option value="5000">5 km</option>
    <option value="10000">10 km</option>
  </select>
  <label><input id="musica" type="checkbox"> música ao vivo</label>
  <label><input id="open" type="checkbox"> aberto agora</label>
  <label><input id="evento" type="checkbox"> com evento</label>
  <button id="go">Buscar</button>
  <a href="stats.html" style="color:#9fb3c8;text-decoration:none;font-size:16px" title="estatísticas">📊</a>
</div>
<div id="status">localizando você… (toque no mapa para buscar em outro ponto)</div>
<div id="map"></div>
<script>
var center = { lat: -23.5505, lng: -46.6333 };
var API = 'https://quxzjsnjgpisepslcpnc.supabase.co/functions/v1/search';
var STATS = 'https://quxzjsnjgpisepslcpnc.supabase.co/functions/v1/stats';
fetch(STATS, { method: 'POST', headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ beacon: 'map_open' }) });

var map, info, meMarker;
var markers = [];
var statusEl = document.getElementById('status');

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: center, zoom: 14, clickableIcons: false,
    streetViewControl: false, mapTypeControl: false, fullscreenControl: false,
  });
  info = new google.maps.InfoWindow();
  meMarker = new google.maps.Marker({
    position: center, map: map, zIndex: 999, title: 'você',
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8,
      fillColor: '#2b6cb0', fillOpacity: 1,
      strokeColor: '#fff', strokeWeight: 2 },
  });
  map.addListener('click', function (e) {
    center = { lat: e.latLng.lat(), lng: e.latLng.lng() };
    meMarker.setPosition(center);
    buscar();
  });
  buscar();
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function (pos) {
      center = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      meMarker.setPosition(center);
      map.setCenter(center);
      map.setZoom(15);
      buscar();
    }, function () {
      statusEl.textContent = 'sem localização — toque no mapa para mudar o ponto';
    }, { timeout: 5000 });
  }
}

function fmtEvent(ev) {
  if (!ev) return '';
  var d = new Date(ev.starts_at);
  var quando = d.toLocaleString('pt-BR', { weekday: 'short', day: '2-digit',
    month: '2-digit', hour: '2-digit', minute: '2-digit',
    timeZone: 'America/Sao_Paulo' });
  var html = '<div class="event">🎵 <b>' + ev.title + '</b><br>' + quando;
  if (ev.price_min != null) html += ' · a partir de R$ ' + ev.price_min;
  if (ev.ticket_url) html += ' · <a href="' + ev.ticket_url +
    '" target="_blank">ingresso</a>';
  return html + '</div>';
}

function popup(r) {
  var abertoTxt = r.open_now === true ? '<span class="aberto">aberto</span>'
    : r.open_now === false ? '<span class="fechado">fechado</span>'
    : 'horário desconhecido';
  var tags = Object.keys(r.tags || {}).map(function (k) {
    var v = r.tags[k];
    return '<span class="tag">' + (v === true ? k :
      k + ': ' + (Array.isArray(v) ? v.join(', ') : v)) + '</span>';
  }).join('');
  var links = [];
  if (r.next_event && r.next_event.source_url) {
    links.push('<a href="' + r.next_event.source_url +
      '" target="_blank">mais info</a>');
  }
  if (r.instagram) {
    links.push('<a href="https://instagram.com/' + r.instagram +
      '" target="_blank">Instagram</a>');
  }
  links.push('<a href="' + r.maps_url + '" target="_blank">Google Maps →</a>');
  return '<div class="popup"><h3>' + r.name + '</h3>' +
    '<div class="meta">' + r.place_type + ' · ' + r.distance_m + 'm · ' +
    abertoTxt + '</div>' + tags + fmtEvent(r.next_event) +
    '<div style="display:flex;gap:12px;flex-wrap:wrap">' + links.join('') +
    '</div></div>';
}

function buscar() {
  if (!map) return;
  statusEl.textContent = 'buscando…';
  var p = new URLSearchParams({
    lat: center.lat, lng: center.lng,
    radius_m: document.getElementById('radius').value, limit: 50,
  });
  var q = document.getElementById('q').value.trim();
  if (q) p.set('q', q);
  var when = document.getElementById('when').value;
  if (when) p.set('when', when);
  if (document.getElementById('open').checked) p.set('open_now', 'true');
  if (document.getElementById('evento').checked) p.set('has_event', 'true');
  if (document.getElementById('musica').checked) p.set('tags', 'musica_ao_vivo');
  fetch(API + '?' + p).then(function (r) { return r.json(); })
    .then(function (d) {
      markers.forEach(function (m) { m.setMap(null); });
      markers = [];
      (d.results || []).forEach(function (r) {
        var cor = r.open_now === true ? '#0a7d33'
          : r.open_now === false ? '#888' : '#2b6cb0';
        var m = new google.maps.Marker({
          position: { lat: r.location.lat, lng: r.location.lng },
          map: map,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 9,
            fillColor: cor, fillOpacity: 0.95,
            strokeColor: '#fff', strokeWeight: 2 },
        });
        m.addListener('click', function () {
          info.setContent(popup(r));
          info.open({ map: map, anchor: m });
        });
        markers.push(m);
      });
      statusEl.textContent = d.count + ' lugar(es) — verde: aberto agora · ' +
        'cinza: fechado · azul: horário desconhecido';
      if (d.count > 0) {
        var bounds = new google.maps.LatLngBounds();
        markers.forEach(function (m) { bounds.extend(m.getPosition()); });
        bounds.extend(meMarker.getPosition());
        map.fitBounds(bounds, 60);
        google.maps.event.addListenerOnce(map, 'idle', function () {
          if (map.getZoom() > 16) map.setZoom(16);
        });
      }
    })
    .catch(function (e) { statusEl.textContent = 'erro: ' + e.message; });
}

document.getElementById('go').onclick = buscar;
document.getElementById('q').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') buscar();
});
</script>
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAize4UIpEPs2H9iDtvYXVMMOCRV0mXCYQ&callback=initMap&language=pt-BR&region=BR">
</script>
</body>
</html>
