<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maps API — mapa vivo</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
  #bar { padding: 8px; background: #1a1a2e; color: #fff; display: flex;
         flex-wrap: wrap; gap: 6px; align-items: center; }
  #bar input[type=text] { flex: 1; min-width: 120px; padding: 7px 10px;
         border-radius: 8px; border: none; font-size: 14px; }
  #bar select, #bar button { padding: 7px 8px; border-radius: 8px;
         border: none; font-size: 13px; }
  #bar label { font-size: 12px; display: flex; align-items: center; gap: 3px;
         white-space: nowrap; }
  #bar button { background: #e94560; color: #fff; font-weight: 600;
         cursor: pointer; }
  #chips { display: flex; gap: 5px; padding: 7px 8px 0; background: #1a1a2e;
         flex-wrap: wrap; }
  .chip { border: 1px solid #3a3a5e; background: #232346; color: #cfd8e3;
         border-radius: 999px; padding: 4px 12px; font-size: 12.5px;
         cursor: pointer; user-select: none; }
  .chip.on { background: #e94560; border-color: #e94560; color: #fff;
         font-weight: 700; }
  #map { height: calc(100vh - 132px); }
  #status { padding: 4px 10px; font-size: 12px; background: #16213e;
         color: #9fb3c8; }
  .popup h3 { margin: 0 0 4px; font-size: 15px; }
  .popup .meta { color: #555; font-size: 12px; margin-bottom: 6px; }
  .popup .tag { display: inline-block; background: #eef; color: #336;
         border-radius: 10px; padding: 1px 8px; font-size: 11px;
         margin: 0 3px 3px 0; }
  .popup .event { background: #fff7e6; border-radius: 8px; padding: 6px 8px;
         font-size: 12px; margin: 6px 0; }
  .popup a { color: #e94560; font-weight: 600; font-size: 13px; }
  .aberto { color: #0a7d33; font-weight: 700; }
  .fechado { color: #a33; font-weight: 700; }
  /* pins tininos (AdvancedMarker content) */
  .pin { position: relative; width: 34px; height: 34px; border-radius: 50%;
         background: #fff; display: flex; align-items: center;
         justify-content: center; font-size: 17px; cursor: pointer;
         border: 3px solid #2b6cb0;
         box-shadow: 0 2px 6px rgba(0,0,0,.35);
         transition: transform .12s; }
  .pin:hover { transform: scale(1.18); z-index: 5; }
  .pin.aberto-sim { border-color: #0a9d43; }
  .pin.aberto-nao { border-color: #9aa5b1; filter: saturate(.55); }
  .pin .badge { position: absolute; top: -7px; right: -7px; font-size: 12px;
         background: #e94560; border-radius: 50%; width: 17px; height: 17px;
         display: flex; align-items: center; justify-content: center;
         color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
  .pin.hoje::after { content: ''; position: absolute; inset: -9px;
         border-radius: 50%; border: 3px solid #e94560; opacity: .8;
         animation: pulse 1.6s ease-out infinite; pointer-events: none; }
  @keyframes pulse {
    0%   { transform: scale(.75); opacity: .8; }
    100% { transform: scale(1.25); opacity: 0; }
  }
  .me { width: 18px; height: 18px; border-radius: 50%; background: #2b6cb0;
        border: 3px solid #fff; box-shadow: 0 0 6px rgba(0,0,0,.5); }
</style>
</head>
<body>
<div id="bar">
  <input id="q" type="text" placeholder="samba, espetinho, rock...">
  <select id="cidade" title="ir para cidade">
    <option value="">🏙️ ir para…</option>
    <option value="-23.5505,-46.6333">São Paulo</option>
    <option value="-19.9227,-43.9451">Belo Horizonte</option>
    <option value="-10.1846,-48.3336">Palmas</option>
    <option value="-16.6869,-49.2648">Goiânia</option>
  </select>
  <select id="radius">
    <option value="1000">1 km</option>
    <option value="2000" selected>2 km</option>
    <option value="5000">5 km</option>
    <option value="10000">10 km</option>
  </select>
  <label><input id="musica" type="checkbox"> música ao vivo</label>
  <label><input id="evento" type="checkbox" checked> com evento</label>
  <button id="loc" title="usar minha localização" style="background:#2b6cb0">📍</button>
  <button id="go">Buscar</button>
  <a href="stats.html" style="color:#9fb3c8;text-decoration:none;font-size:16px" title="estatísticas">📊</a>
</div>
<div id="chips">
  <span class="chip on" data-modo="">qualquer dia</span>
  <span class="chip" data-modo="agora">🔥 agora</span>
  <span class="chip" data-modo="today">hoje</span>
  <span class="chip" data-modo="amanha">amanhã</span>
  <span class="chip" data-modo="weekend">fim de semana</span>
</div>
<div id="status">localizando você… (toque no mapa para buscar em outro ponto)</div>
<div id="map"></div>
<script>
var center = { lat: -23.5505, lng: -46.6333 };
var API = 'https://quxzjsnjgpisepslcpnc.supabase.co/functions/v1/search';
var STATS = 'https://quxzjsnjgpisepslcpnc.supabase.co/functions/v1/stats';
fetch(STATS, { method: 'POST', headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ beacon: 'map_open' }) });

var map, info, meMarker;
var markers = [];
var modo = '';   // '' | agora | today | amanha | weekend
var statusEl = document.getElementById('status');

var EMOJI = { bar: '🍺', restaurante: '🍽️', casa_de_show: '🎤',
  teatro: '🎭', praca: '🌳', event_venue: '🎪', other: '📍' };

// SP é UTC-3 fixo — mesma conta do backend
function spDate(daysAhead) {
  var d = new Date(Date.now() - 3 * 3600000 + (daysAhead || 0) * 86400000);
  return d.toISOString().slice(0, 10);
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: center, zoom: 14, clickableIcons: false,
    mapId: 'DEMO_MAP_ID',
    streetViewControl: false, mapTypeControl: false, fullscreenControl: false,
  });
  info = new google.maps.InfoWindow();
  var meEl = document.createElement('div');
  meEl.className = 'me';
  meEl.title = 'ponto de busca';
  meMarker = new google.maps.marker.AdvancedMarkerElement({
    position: center, map: map, zIndex: 999, content: meEl,
  });
  map.addListener('click', function (e) {
    center = { lat: e.latLng.lat(), lng: e.latLng.lng() };
    meMarker.position = center;
    buscar();
  });
  buscar();
  localizar(false);
}

// centraliza no usuário; no Mac sem GPS o CoreLocation às vezes falha
// (kCLErrorLocationUnknown) — falha vira aviso, e o botão 📍 re-tenta
function localizar(manual) {
  if (!navigator.geolocation) {
    if (manual) statusEl.textContent = 'navegador sem geolocalização';
    return;
  }
  if (manual) statusEl.textContent = 'localizando você…';
  navigator.geolocation.getCurrentPosition(function (pos) {
    center = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    meMarker.position = center;
    map.setCenter(center);
    map.setZoom(15);
    buscar();
  }, function () {
    statusEl.textContent = 'seu aparelho não conseguiu se localizar — ' +
      'toque no mapa, use 🏙️ ou tente 📍 de novo';
  }, { enableHighAccuracy: false, timeout: 8000, maximumAge: 120000 });
}

function temEventoHoje(r) {
  if (!r.next_event) return false;
  var hoje = spDate(0);
  var d = new Date(r.next_event.starts_at);
  var diaEv = new Date(d.getTime() - 3 * 3600000).toISOString().slice(0, 10);
  return diaEv === hoje;
}

function pinEl(r) {
  var el = document.createElement('div');
  el.className = 'pin ' + (r.open_now === true ? 'aberto-sim'
    : r.open_now === false ? 'aberto-nao' : '');
  if (temEventoHoje(r)) el.className += ' hoje';
  el.textContent = EMOJI[r.place_type] || EMOJI.other;
  el.title = r.name;
  if (r.next_event) {
    var b = document.createElement('span');
    b.className = 'badge';
    b.textContent = '🎵';
    el.appendChild(b);
  }
  return el;
}

function fmtEvent(ev) {
  if (!ev) return '';
  var d = new Date(ev.starts_at);
  // horário honesto (D18b): hora não confirmada não aparece — só o dia
  var quando = ev.start_time_known === false
    ? d.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit',
        month: '2-digit', timeZone: 'America/Sao_Paulo' }) + ' · horário no local'
    : d.toLocaleString('pt-BR', { weekday: 'short', day: '2-digit',
        month: '2-digit', hour: '2-digit', minute: '2-digit',
        timeZone: 'America/Sao_Paulo' });
  var html = '<div class="event">🎵 <b>' + ev.title + '</b><br>' + quando;
  if (ev.price_min != null) html += ' · a partir de R$ ' + ev.price_min;
  if (ev.ticket_url) html += ' · <a href="' + ev.ticket_url +
    '" target="_blank">ingresso</a>';
  return html + '</div>';
}

function popup(r) {
  var abertoTxt = r.open_now === true ? '<span class="aberto">aberto</span>'
    : r.open_now === false ? '<span class="fechado">fechado</span>'
    : 'horário desconhecido';
  var tags = Object.keys(r.tags || {}).map(function (k) {
    var v = r.tags[k];
    return '<span class="tag">' + (v === true ? k :
      k + ': ' + (Array.isArray(v) ? v.join(', ') : v)) + '</span>';
  }).join('');
  var links = [];
  if (r.next_event && r.next_event.source_url) {
    links.push('<a href="' + r.next_event.source_url +
      '" target="_blank">mais info</a>');
  }
  if (r.instagram) {
    links.push('<a href="https://instagram.com/' + r.instagram +
      '" target="_blank">Instagram</a>');
  }
  links.push('<a href="' + r.maps_url + '" target="_blank">Google Maps →</a>');
  links.push('<a href="https://m.uber.com/ul/?action=setPickup&pickup=my_location' +
    '&dropoff[latitude]=' + r.location.lat +
    '&dropoff[longitude]=' + r.location.lng +
    '&dropoff[nickname]=' + encodeURIComponent(r.name) +
    '" target="_blank">🚗 Uber</a>');
  links.push('<a href="taxis99://call?dest_lat=' + r.location.lat +
    '&dest_lng=' + r.location.lng +
    '&dest_name=' + encodeURIComponent(r.name) +
    '" title="abre o app do 99">🚕 99</a>');
  return '<div class="popup"><h3>' + r.name + '</h3>' +
    '<div class="meta">' + r.place_type + ' · ' + r.distance_m + 'm · ' +
    abertoTxt + '</div>' + tags + fmtEvent(r.next_event) +
    '<div style="display:flex;gap:12px;flex-wrap:wrap">' + links.join('') +
    '</div></div>';
}

function buscar() {
  if (!map) return;
  statusEl.textContent = 'buscando…';
  var p = new URLSearchParams({
    lat: center.lat, lng: center.lng,
    radius_m: document.getElementById('radius').value, limit: 50,
  });
  var q = document.getElementById('q').value.trim();
  if (q) p.set('q', q);
  if (modo === 'agora') p.set('open_now', 'true');
  else if (modo === 'today') p.set('when', 'today');
  else if (modo === 'amanha') p.set('when', spDate(1));
  else if (modo === 'weekend') p.set('when', 'weekend');
  if (document.getElementById('evento').checked) p.set('has_event', 'true');
  if (document.getElementById('musica').checked) p.set('tags', 'musica_ao_vivo');
  fetch(API + '?' + p).then(function (r) { return r.json(); })
    .then(function (d) {
      markers.forEach(function (m) { m.map = null; });
      markers = [];
      (d.results || []).forEach(function (r) {
        var m = new google.maps.marker.AdvancedMarkerElement({
          position: { lat: r.location.lat, lng: r.location.lng },
          map: map,
          content: pinEl(r),
          gmpClickable: true,
        });
        m.addEventListener('gmp-click', function () {
          info.setContent(popup(r));
          info.open({ map: map, anchor: m });
        });
        markers.push(m);
      });
      statusEl.textContent = d.count +
        ' lugar(es) — anel verde: aberto · cinza: fechado · azul: não sei · ' +
        '🎵 tem evento · pulsando: evento HOJE';
      if (d.count > 0) {
        var bounds = new google.maps.LatLngBounds();
        markers.forEach(function (m) { bounds.extend(m.position); });
        bounds.extend(meMarker.position);
        map.fitBounds(bounds, 60);
        google.maps.event.addListenerOnce(map, 'idle', function () {
          if (map.getZoom() > 16) map.setZoom(16);
        });
      }
    })
    .catch(function (e) { statusEl.textContent = 'erro: ' + e.message; });
}

document.querySelectorAll('.chip').forEach(function (c) {
  c.onclick = function () {
    document.querySelectorAll('.chip').forEach(function (x) {
      x.classList.remove('on');
    });
    c.classList.add('on');
    modo = c.dataset.modo;
    buscar();
  };
});
document.getElementById('cidade').onchange = function () {
  if (!this.value) return;
  var xy = this.value.split(',');
  center = { lat: parseFloat(xy[0]), lng: parseFloat(xy[1]) };
  meMarker.position = center;
  map.setCenter(center);
  map.setZoom(14);
  this.value = '';
  buscar();
};
document.getElementById('loc').onclick = function () { localizar(true); };
document.getElementById('go').onclick = buscar;
document.getElementById('q').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') buscar();
});
</script>
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAize4UIpEPs2H9iDtvYXVMMOCRV0mXCYQ&callback=initMap&language=pt-BR&region=BR&libraries=marker&v=weekly&loading=async">
</script>
</body>
</html>
