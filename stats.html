<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maps API — estatísticas</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif;
         background: #f4f5f7; color: #1a1a2e; }
  header { background: #1a1a2e; color: #fff; padding: 14px 18px;
           display: flex; align-items: baseline; gap: 12px; }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; }
  header a { color: #9fb3c8; font-size: 13px; text-decoration: none; }
  header small { color: #9fb3c8; margin-left: auto; font-size: 12px; }
  main { max-width: 900px; margin: 0 auto; padding: 16px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
           gap: 10px; margin-bottom: 18px; }
  .card { background: #fff; border-radius: 12px; padding: 14px;
          box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card .n { font-size: 26px; font-weight: 700; }
  .card .l { font-size: 12px; color: #667; margin-top: 2px; }
  h2 { font-size: 14px; color: #445; margin: 18px 0 8px; }
  table { width: 100%; border-collapse: collapse; background: #fff;
          border-radius: 12px; overflow: hidden;
          box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 13px; }
  th, td { text-align: left; padding: 8px 12px;
           border-bottom: 1px solid #eef0f3; }
  th { background: #fafbfc; color: #667; font-weight: 600; font-size: 12px; }
  .ok { color: #0a7d33; font-weight: 700; }
  .err { color: #a33; font-weight: 700; }
  .bar { background: #e94560; height: 10px; border-radius: 5px; }
  .muted { color: #99a; }
  #status { padding: 8px 18px; font-size: 12px; color: #667; }
</style>
</head>
<body>
<header>
  <h1>📊 Maps API — estatísticas</h1>
  <a href="./index.html">← mapa</a>
  <small id="quando"></small>
</header>
<div id="status">carregando…</div>
<main id="main" style="display:none">
  <div class="cards" id="cards"></div>
  <h2>Fontes de dados (saúde do pipeline)</h2>
  <table id="fontes"><thead><tr>
    <th>fonte</th><th>status</th><th>último run</th>
    <th>eventos ativos</th><th></th>
  </tr></thead><tbody></tbody></table>
  <h2>Top buscas (7 dias)</h2>
  <table id="buscas"><thead><tr><th>busca</th><th>vezes</th></tr></thead>
    <tbody></tbody></table>
  <h2>Regiões na fila de expansão</h2>
  <table id="regioes"><thead><tr>
    <th>grade (lat,lng)</th><th>pedidos</th><th>status</th>
  </tr></thead><tbody></tbody></table>
</main>
<script>
var STATS = 'https://quxzjsnjgpisepslcpnc.supabase.co/functions/v1/stats';

function card(n, label) {
  return '<div class="card"><div class="n">' + n + '</div>' +
    '<div class="l">' + label + '</div></div>';
}

fetch(STATS, { cache: 'no-store' }).then(function (r) { return r.json(); }).then(function (d) {
  if (!d || !d.base) {
    document.getElementById('status').textContent =
      'resposta inesperada: ' + JSON.stringify(d).slice(0, 140);
    return;
  }
  document.getElementById('status').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('quando').textContent =
    'atualizado ' + new Date(d.atualizado_em).toLocaleString('pt-BR',
      { timeZone: 'America/Sao_Paulo' });

  var b = d.base, u = d.uso;
  document.getElementById('cards').innerHTML =
    card(b.lugares_ativos, 'lugares ativos') +
    card(b.eventos_ativos, 'eventos ativos') +
    card(b.lugares_com_evento, 'lugares com evento') +
    card(b.tags, 'tags') +
    card(u.buscas_hoje + ' <span class="muted">/ ' + u.buscas_7d + '</span>',
      'buscas hoje / 7d') +
    card(u.mapa_hoje + ' <span class="muted">/ ' + u.mapa_7d + '</span>',
      'mapa aberto hoje / 7d') +
    card(b.celulas_pendentes, 'células na fila do curador');

  var max = Math.max.apply(null, d.fontes.map(function (f) {
    return f.eventos_ativos; }).concat([1]));
  document.querySelector('#fontes tbody').innerHTML =
    d.fontes.map(function (f) {
      var st = f.status === 'ok'
        ? '<span class="ok">ok</span>'
        : f.status ? '<span class="err">' + f.status + '</span>'
        : '<span class="muted">—</span>';
      var quando = f.ultimo_run
        ? new Date(f.ultimo_run).toLocaleString('pt-BR',
            { day: '2-digit', month: '2-digit', hour: '2-digit',
              minute: '2-digit', timeZone: 'America/Sao_Paulo' })
        : '—';
      return '<tr><td>' + f.nome + (f.habilitada ? '' :
          ' <span class="muted">(off)</span>') +
        '</td><td>' + st + '</td><td>' + quando + '</td><td>' +
        f.eventos_ativos + '</td><td style="width:30%"><div class="bar" ' +
        'style="width:' + Math.round(100 * f.eventos_ativos / max) +
        '%"></div></td></tr>';
    }).join('');

  document.querySelector('#buscas tbody').innerHTML =
    (u.top_buscas_7d.length ? u.top_buscas_7d : [])
      .map(function (t) {
        return '<tr><td>' + t.q + '</td><td>' + t.vezes + '</td></tr>';
      }).join('') || '<tr><td colspan="2" class="muted">sem buscas com texto ainda</td></tr>';

  document.querySelector('#regioes tbody').innerHTML =
    (d.base.regioes.length ? d.base.regioes : [])
      .map(function (r) {
        return '<tr><td>' + r.grade + '</td><td>' + r.pedidos + '</td><td>' +
          r.status + '</td></tr>';
      }).join('') || '<tr><td colspan="3" class="muted">nenhuma região pedida ainda</td></tr>';
}).catch(function (e) {
  document.getElementById('status').textContent = 'erro: ' + e.message;
});
</script>
</body>
</html>
